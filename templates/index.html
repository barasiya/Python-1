<!DOCTYPE html>
<html>
<head>
    <title>Flask To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        li {
            margin: 10px;
            list-style: none;
        }

        a {
            color: red;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h1>📝 My To-Do List is 12345</h1>

    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Enter task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                {{ task }}
                <a href="/delete/{{ loop.index0 }}">❌</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
